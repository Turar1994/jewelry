<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Zeynep Sotuar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#faf9f7;height:100%;overscroll-behavior:none}
:root{
  --gold:#b8962e;--gold-light:#c9a84c;--gold-dim:#d4b483;--gold-pale:#f5ead6;
  --white:#ffffff;--bg:#faf9f7;--bg2:#f5f2ee;--bg3:#ede9e3;
  --border:rgba(184,150,46,0.2);--border2:rgba(184,150,46,0.12);
  --text:#2c2418;--text-mid:#6b5d4a;--text-dim:#a8997f;
  --green:#4a9e6b;--red:#c0514a;--blue:#4a7bbf;
  --shadow:0 2px 12px rgba(184,150,46,0.08);
  --shadow2:0 4px 24px rgba(184,150,46,0.12);
  --sb:env(safe-area-inset-bottom,0px)
}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);padding-bottom:calc(72px + var(--sb))}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border2);padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:60px;box-shadow:var(--shadow)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{height:42px;width:42px;object-fit:contain}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:var(--gold);letter-spacing:2px;line-height:1.1}
.logo-text small{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);font-style:normal;font-family:'Jost',sans-serif;font-weight:300}
.topbar-right{display:flex;align-items:center;gap:10px}
#sync-status{font-size:10px;letter-spacing:.5px;color:var(--gold);transition:opacity .5s;opacity:0;white-space:nowrap}
.topbar-btn{background:var(--gold);color:var(--white);border:none;border-radius:4px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;padding:9px 16px;cursor:pointer;box-shadow:0 2px 8px rgba(184,150,46,0.3)}
.topbar-btn.hidden{display:none}
.sync-icon-btn{background:none;border:1.5px solid var(--border2);border-radius:6px;color:var(--text-mid);font-size:15px;padding:5px 9px;cursor:pointer;line-height:1}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border2);display:flex;z-index:200;padding-bottom:var(--sb);box-shadow:0 -2px 12px rgba(0,0,0,0.05)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text-dim);cursor:pointer;padding:10px 4px;min-height:58px;transition:color .2s;position:relative}
.bnav-btn.active{color:var(--gold)}
.bnav-btn.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:0 0 2px 2px}
.bnav-icon{font-size:19px;line-height:1}
.bnav-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-family:'Jost',sans-serif;font-weight:400}

/* CONTENT */
.content{padding:20px 16px 12px;max-width:640px;margin:0 auto}
.page-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--text);letter-spacing:1px}
.page-sub{color:var(--text-dim);font-size:12px;margin-top:4px;margin-bottom:16px}
.divider{width:36px;height:1.5px;background:linear-gradient(90deg,var(--gold),transparent);margin:8px 0 16px}
.page{display:none}.page.active{display:block}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--text);margin-bottom:12px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--white);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold);display:block;margin-bottom:2px;line-height:1.1}
.stat-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim)}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.badge-metal{background:rgba(184,150,46,.1);color:var(--gold);border:1px solid rgba(184,150,46,.25)}
.badge-stone{background:rgba(74,123,191,.08);color:var(--blue);border:1px solid rgba(74,123,191,.2)}
.badge-bead{background:rgba(180,120,60,.08);color:#a0724a;border:1px solid rgba(180,120,60,.2)}
.badge-thread{background:rgba(74,158,107,.08);color:var(--green);border:1px solid rgba(74,158,107,.2)}
.badge-fitting{background:rgba(140,80,160,.08);color:#8c50a0;border:1px solid rgba(140,80,160,.2)}
.badge-necklace{background:rgba(184,150,46,.1);color:var(--gold);border:1px solid rgba(184,150,46,.25)}
.badge-ring{background:rgba(192,81,74,.08);color:var(--red);border:1px solid rgba(192,81,74,.2)}
.badge-earring{background:rgba(74,123,191,.08);color:var(--blue);border:1px solid rgba(74,123,191,.2)}
.badge-bracelet{background:rgba(74,158,107,.08);color:var(--green);border:1px solid rgba(74,158,107,.2)}
.badge-other{background:rgba(100,100,100,.06);color:var(--text-dim);border:1px solid rgba(100,100,100,.12)}
.status-working{background:rgba(74,123,191,.08);color:var(--blue);border:1px solid rgba(74,123,191,.2)}
.status-ready{background:rgba(184,150,46,.1);color:var(--gold);border:1px solid rgba(184,150,46,.25)}
.status-sold{background:rgba(74,158,107,.08);color:var(--green);border:1px solid rgba(74,158,107,.2)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 20px;border-radius:6px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;border:none;min-height:42px;font-weight:500}
.btn-gold{background:var(--gold);color:var(--white);box-shadow:0 2px 8px rgba(184,150,46,0.3)}
.btn-gold:hover{background:var(--gold)}
.btn-outline{background:transparent;color:var(--gold);border:1.5px solid var(--gold-dim)}
.btn-ghost{background:var(--bg2);color:var(--text-mid);border:1px solid var(--border2)}
.btn-danger{background:rgba(192,81,74,.06);color:var(--red);border:1px solid rgba(192,81,74,.15)}
.btn-green{background:rgba(74,158,107,.08);color:var(--green);border:1px solid rgba(74,158,107,.25)}
.btn-sm{padding:7px 13px;font-size:10px;min-height:32px}
.btn-full{width:100%}

/* FILTERS */
.filter-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:7px 16px;border-radius:20px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--border2);background:var(--white);color:var(--text-dim);transition:all .15s}
.filter-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}

/* RECIPE CARD */
.recipe-card{background:var(--white);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.recipe-header{padding:14px 16px 12px;border-bottom:1px solid var(--border2)}
.recipe-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--text);margin:6px 0 3px}
.recipe-body{padding:12px 16px 16px}
.ing-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:13px;color:var(--text-mid)}
.ing-row:last-child{border-bottom:none}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.price-label{color:var(--text-dim)}
.price-val{color:var(--text-mid)}
.price-final{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold)}

/* LIST */
.list-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.list-item:last-child{border-bottom:none}
.list-label{color:var(--text);font-size:14px}
.list-sub{font-size:11px;color:var(--text-dim);margin-top:2px}

/* ORDER CARD */
.order-card{background:var(--white);border:1px solid var(--border2);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.order-header{padding:12px 16px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:flex-start}
.order-body{padding:12px 16px 16px}
.order-num{font-size:10px;letter-spacing:2px;color:var(--text-dim)}
.order-name{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--text);margin-top:2px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(44,36,24,.5);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-height:92dvh;overflow-y:auto;padding:20px 20px calc(20px + var(--sb));box-shadow:0 -8px 40px rgba(0,0,0,0.12)}
.modal-handle{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text);margin-bottom:20px}
.modal-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border2)}

/* FORM */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:7px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Jost',sans-serif;font-size:16px;padding:12px 14px;outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold)}
.form-select option{background:var(--white)}
.form-textarea{resize:none;min-height:80px;font-size:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* SHOP */
.shop-item{background:var(--white);border:1px solid var(--border2);border-radius:10px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);transition:opacity .2s}
.shop-item.done{opacity:.4}
.check-box{width:24px;height:24px;border:2px solid var(--gold-dim);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-box.on{background:var(--gold);border-color:var(--gold);color:var(--white)}
.shop-info{flex:1;min-width:0}
.shop-name{color:var(--text);font-size:14px}
.shop-name.done-text{text-decoration:line-through}
.shop-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.progress-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width .4s}

/* CFG */
.cfg-card{background:var(--white);border:1.5px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .2s;box-shadow:var(--shadow)}
.cfg-card.selected{border-color:var(--gold);background:var(--gold-pale)}
.cfg-calc{background:var(--white);border:1.5px solid var(--gold-dim);border-radius:12px;padding:16px;margin-top:16px;box-shadow:var(--shadow2)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px}
.empty-icon{font-size:40px;opacity:.25;margin-bottom:12px}
.empty-text{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--text-dim)}

/* ALERT */
.alert-low{background:rgba(192,81,74,.06);border:1px solid rgba(192,81,74,.2);border-radius:10px;padding:12px 14px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
.hidden{display:none!important}
</style>
</head>

<script>
const CAT = {metal:"Металл",stone:"Камень",bead:"Бусины",thread:"Нить/шнур",fitting:"Фурнитура"};
const TYPE = {necklace:"Ожерелье",ring:"Кольцо",earring:"Серьги",bracelet:"Браслет",other:"Другое"};
const STATUS = {working:"В работе",ready:"Готово",sold:"Продано"};
const ORDER_TYPE = {standard:"Стандартный",special:"Специальный"};
const LOW=10, MIN=20;

// ── Supabase inline client ──
const SUPA_URL = 'https://ztpxsqfcffmfcemuvqrf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0cHhzcWZjZmZtZmNlbXV2cXJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzI4NDUsImV4cCI6MjA4OTQwODg0NX0.lLlWkaAaOKwQNNsm5eJP0OBNMi9hqJIXqtf_2fxPdKU';
let syncing = false;

const _h = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
async function sbGet(table, filters='') {
  const r = await fetch(SUPA_URL+'/rest/v1/'+table+'?select=*'+filters, {headers:_h});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, data) {
  const r = await fetch(SUPA_URL+'/rest/v1/'+table, {method:'POST',headers:_h,body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, id, data) {
  const r = await fetch(SUPA_URL+'/rest/v1/'+table+'?id=eq.'+id, {method:'PATCH',headers:{..._h,'Prefer':'return=minimal'},body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, id) {
  const r = await fetch(SUPA_URL+'/rest/v1/'+table+'?id=eq.'+id, {method:'DELETE',headers:_h});
  if(!r.ok) throw new Error(await r.text());
}
async function sbUpsert(table, data) {
  if(!data || !data.length) return;
  const r = await fetch(SUPA_URL+'/rest/v1/'+table, {
    method:'POST',
    headers:{..._h,'Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify(data)
  });
  if(!r.ok) {
    const err = await r.text();
    throw new Error(err);
  }
}
let syncQueue = [];


// ── Photo helpers ──
function savePhotos(type, items) {
  // Photos go to Supabase via syncToCloud — nothing to do here
}
function loadPhotos(type, items) {
  // Photos are stored directly in Supabase now — just return items
  return items;
}
function showSyncStatus(msg, color='var(--gold)') {
  const el = document.getElementById('sync-status');
  if(!el) return;
  el.textContent = msg; el.style.color = color; el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity='0'; }, 3000);
}

async function syncToCloud() {
  if(syncing) return;
  syncing = true;
  showSyncStatus('💾 Сохраняю...', 'var(--gold-dim)');
  try {
    // Save photos locally (too large for DB)
    // Photos stored as base64 in Supabase photo column
    // Upsert clean data to Supabase (only DB columns, no undefined)
    const matsClean = materials.map(m=>({
      id: Number(m.id), name: m.name||'', unit: m.unit||'шт',
      stock: Number(m.stock)||0, price: Number(m.price)||0,
      category: m.category||'other',
      ordered: m.ordered||false, ordered_qty: Number(m.orderedQty||m.ordered_qty)||0,
      photo: (m.photo && m.photo.startsWith('data:')) ? m.photo : ''
    }));
    const recsClean = recipes.map(r=>({
      id: Number(r.id), name: r.name||'', type: r.type||'other',
      description: r.description||'',
      ingredients: r.ingredients||[],
      markup: Number(r.markup)||100,
      custom_price: r.customPrice!=null ? Number(r.customPrice) : null,
      labor_hours: Number(r.laborHours||r.labor_hours)||0,
      labor_rate: Number(r.laborRate||r.labor_rate)||3000,
      photo: (r.photo && r.photo.startsWith('data:')) ? r.photo : ''
    }));
    const ordsClean = orders.map(o=>({
      id: Number(o.id), recipe_id: Number(o.rid||o.recipe_id)||null,
      order_type: o.orderType||o.order_type||'',
      qty: Number(o.qty)||1, client: o.client||'',
      note: o.note||'', wishes: o.wishes||'',
      custom_title: o.customTitle||o.custom_title||'',
      status: o.status||'working',
      price: Number(o.price)||0, advance: Number(o.advance)||0,
      deadline: o.deadline||null,
      created_at: o.date||o.created_at||new Date().toISOString().slice(0,10)
    }));
    try {
      await Promise.all([
        sbUpsert('jewelry_materials', matsClean),
        sbUpsert('jewelry_recipes', recsClean),
        sbUpsert('jewelry_orders', ordsClean)
      ]);
    } catch(syncErr) {
      if(String(syncErr.message).includes('deadline')) {
        const ordsNoDeadline = ordsClean.map(({deadline,...o})=>o);
        await Promise.all([
          sbUpsert('jewelry_materials', matsClean),
          sbUpsert('jewelry_recipes', recsClean),
          sbUpsert('jewelry_orders', ordsNoDeadline)
        ]);
      } else throw syncErr;
    }
    lastSync = new Date().toLocaleTimeString('ru');
    showSyncStatus('✓ Сохранено ' + lastSync, 'var(--green)');
  } catch(e) {
    console.error('Sync error:', e);
    showSyncStatus('⚠ ' + (e.message||'Ошибка синхр.').slice(0,60), 'var(--red)');
  }
  syncing = false;
}

async function loadFromCloud() {
  showSyncStatus('⏳ Загружаю...', 'var(--gold-dim)');
  try {
    const [mats, recs, ords] = await Promise.all([
      sbGet('jewelry_materials'),
      sbGet('jewelry_recipes'),
      sbGet('jewelry_orders', '&order=id.asc'),
    ]);
    // Cloud is source of truth — always overwrite local
    materials = (mats||[]).map(m=>({...m, id:Number(m.id), stock:Number(m.stock), price:Number(m.price),
      photo: m.photo && m.photo.startsWith('data:') ? m.photo : undefined
    }));
    materials = loadPhotos('mats', materials);

    recipes = (recs||[]).map(r=>({
      ...r, id:Number(r.id), markup:Number(r.markup||100),
      laborHours:Number(r.labor_hours||0), laborRate:Number(r.labor_rate||3000),
      customPrice:r.custom_price!=null?Number(r.custom_price):null,
      ingredients:typeof r.ingredients==='string'?JSON.parse(r.ingredients):(r.ingredients||[]),
      photo: r.photo && r.photo.startsWith('data:') ? r.photo : undefined
    }));
    recipes = loadPhotos('recs', recipes);

    orders = (ords||[]).map(o=>({
      ...o, id:Number(o.id), rid:Number(o.recipe_id||o.rid||0),
      qty:Number(o.qty||1), price:Number(o.price||0), advance:Number(o.advance||0),
      orderType:o.order_type||o.orderType||'',
      customTitle:o.custom_title||o.customTitle||'',
      wishes:o.wishes||'',
      deadline:o.deadline||'',
      date:o.created_at||o.date||new Date().toISOString().slice(0,10)
    }));
    lastSync = new Date().toLocaleTimeString('ru');
    showSyncStatus('✓ Загружено ' + lastSync, 'var(--green)');
    render();
  } catch(e) {
    console.error('Load error:', e);
    showSyncStatus('⚠ Нет связи, работаю офлайн', 'var(--gold)');
    render();
  }
}


// ── Default demo data ──

// Calcs
function matCost(rec) {
  return rec.ingredients.reduce((s,ing) => {
    const p = ing.cp != null ? ing.cp : (materials.find(m=>m.id===ing.mid)?.price||0);
    return s + p * ing.qty;
  }, 0);
}
function laborCost(rec) { return (rec.laborHours||0)*(rec.laborRate||0); }
function totalCost(rec) { return matCost(rec) + laborCost(rec); }
function recPrice(rec) { 
  if(rec.customPrice!=null) return rec.customPrice;
  return Math.round(totalCost(rec)*(1+(rec.markup||0)/100));
}
function canMake(rec) {
  if(!rec.ingredients.length) return 0;
  return Math.min(...rec.ingredients.map(ing=>{
    const m=materials.find(x=>x.id===ing.mid);
    return m?Math.floor(m.stock/ing.qty):0;
  }));
}
function ingName(ing) { return ing.cn || materials.find(m=>m.id===ing.mid)?.name||'—'; }
function ingUnitPrice(ing) { return ing.cp!=null?ing.cp:(materials.find(m=>m.id===ing.mid)?.price||0); }
function fmt(n) { return Math.round(n).toLocaleString('ru'); }
function today() { return new Date().toISOString().slice(0,10); }

// Navigation
function goTo(tab) {
  currentTab = tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  const addBtn = document.getElementById('topbar-add-btn');
  const labels = {recipes:'+ Рецепт', materials:'+ Материал', orders:'+ Заказ'};
  if(labels[tab]) { addBtn.textContent = labels[tab]; addBtn.classList.remove('hidden'); }
  else addBtn.classList.add('hidden');
  render();
}

    });

  document.getElementById('page-materials').innerHTML = html;

function receiveOrdered(id) {
  const mat = materials.find(m=>m.id===id);
  if(!mat) return;
  if(confirm(`Принять "${mat.name}" (${mat.orderedQty} ${mat.unit}) на склад?`)) {
    mat.stock = (mat.stock||0) + (mat.orderedQty||0);
    mat.ordered = false;
    mat.orderedQty = 0;
    mat.arrivalDate = null;
    saveMats();
    renderMaterials();
  }
}

        <span class="badge badge-${r.type}" style="margin-bottom:6px;display:inline-block">${TYPE[r.type]}</span>
        <div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text)">${r.name}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:3px">${fmt(c)} ₸ себест. · ${mx} шт доступно</div>
      </div>
      ${cfgSelected===r.id?'<span style="color:var(--gold);font-size:20px">✦</span>':''}
    </div>`;
  });
  if(rec) {
    const cost=totalCost(rec), mx=canMake(rec);
    html+=`<div class="cfg-calc">
      <div style="font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--text);margin-bottom:14px">${rec.name}</div>
      <div class="form-row" style="margin-bottom:14px">
        <div><label class="form-label">Количество</label><input class="form-input" type="number" min="1" id="cfg-qty" value="1" oninput="updateCfg()"/></div>
        <div><label class="form-label">Наценка %</label><input class="form-input" type="number" min="0" id="cfg-markup" value="${rec.markup}" oninput="updateCfg()"/></div>
      </div>
      <div id="cfg-results"></div>
    </div>`;
  }
  document.getElementById('page-configurator').innerHTML = html;
  if(rec) updateCfg();
}

function updateCfg() {
  const rec = recipes.find(r=>r.id===cfgSelected);
  if(!rec) return;
  const qty = parseInt(document.getElementById('cfg-qty')?.value)||1;
  const markup = parseInt(document.getElementById('cfg-markup')?.value)||0;
  const cost = totalCost(rec);
  const unitPrice = cost*(1+markup/100);
  const profit = unitPrice*qty - cost*qty;
  const mx = canMake(rec);
  let html = '';
  [['Себест. за шт',`${fmt(cost)} ₸`],['Цена за шт',`${fmt(unitPrice)} ₸`],['Всего себест.',`${fmt(cost*qty)} ₸`],['Всего выручка',`${fmt(unitPrice*qty)} ₸`]].forEach(([l,v])=>{
    html+=`<div class="price-row"><span class="price-label">${l}</span><span class="price-val">${v}</span></div>`;
  });
  html+=`<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:10px;display:flex;justify-content:space-between">
    <span style="color:var(--text-dim);font-size:13px">Прибыль</span>
    <span class="price-final">${fmt(profit)} ₸</span>
  </div>`;
  if(qty>mx) html+=`<div style="background:rgba(220,100,100,.08);border:1px solid rgba(220,100,100,.2);border-radius:6px;padding:10px 12px;margin-top:12px;font-size:13px;color:var(--red)">⚠ Недостаточно материалов (макс. ${mx} шт)</div>`;
  const el = document.getElementById('cfg-results');
  if(el) el.innerHTML = html;
}

function renderOrders() {
  let filtered = orders;
  if(orderTypeFilter !== 'all') filtered = filtered.filter(o=>(o.orderType||'standard')===orderTypeFilter);
  if(orderFilter !== 'all') filtered = filtered.filter(o=>o.status===orderFilter);
  filtered = filtered.sort((a,b)=>{
    const now=new Date();
    const aO=a.deadline&&new Date(a.deadline)<now, bO=b.deadline&&new Date(b.deadline)<now;
    if(aO&&!bO) return -1; if(!aO&&bO) return 1;
    if(a.deadline&&b.deadline) return new Date(a.deadline)-new Date(b.deadline);
    if(a.deadline) return -1; if(b.deadline) return 1;
    return b.id-a.id;
  });

  const revenue = orders.filter(o=>o.status==='sold').reduce((s,o)=>s+o.price,0);
  const stdCount = orders.filter(o=>(o.orderType||'standard')==='standard').length;
  const specCount = orders.filter(o=>o.orderType==='special').length;
  const activeOrds = orders.filter(o=>o.status!=='sold');
  const totalOwed = activeOrds.reduce((s,o)=>s+(o.price-(o.advance||0)),0);
  const overdueCount = activeOrds.filter(o=>o.deadline&&new Date(o.deadline)<new Date()).length;

  let html = `<h1 class="page-title">Заказы</h1><div class="divider"></div>
  <div class="stat-grid" style="margin-bottom:16px">
    <div class="stat-card"><span class="stat-val" style="color:var(--green);font-size:18px">${fmt(revenue)} ₸</span><span class="stat-label">Выручка</span></div>
    <div class="stat-card"><span class="stat-val" style="color:var(--red);font-size:18px">${fmt(totalOwed)} ₸</span><span class="stat-label">К получению</span></div>
    <div class="stat-card"><span class="stat-val">${orders.length}</span><span class="stat-label">Всего заказов</span></div>
    <div class="stat-card"><span class="stat-val" style="color:${overdueCount>0?'var(--red)':'var(--text)'}">${overdueCount}</span><span class="stat-label">Просрочено</span></div>
  </div>`;

  if(!filtered.length) html+=`<div class="empty"><div class="empty-icon">📦</div><p class="empty-text">Заказов нет</p></div>`;
  else filtered.forEach(ord=>{
    const isSpecial = ord.orderType==='special';
    const r = isSpecial ? null : recipes.find(x=>x.id===ord.rid);
    const cost = r ? totalCost(r)*ord.qty : 0;
    const profit = ord.price - cost;
    const title = isSpecial ? (ord.customTitle||'Спец. заказ') : (r?.name||'—');
    html+=`<div class="order-card" style="${isSpecial?'border-left:3px solid var(--blue)':''}">
      <div class="order-header">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
            <div class="order-num">#${String(ord.id).padStart(4,'0')} · ${ord.date}</div>
            <span class="badge ${isSpecial?'status-working':'badge-other'}" style="${isSpecial?'background:rgba(74,123,191,.1);color:var(--blue);border-color:rgba(74,123,191,.25)':''}">
              ${isSpecial?'✦ Спец.':'Стандарт'}
            </span>
          </div>
          <div class="order-name">${title}</div>
        </div>
        <span class="badge status-${ord.status}" style="flex-shrink:0;margin-left:8px">${STATUS[ord.status]}</span>
      </div>
      <div class="order-body">
        <div style="display:flex;gap:16px;font-size:13px;margin-bottom:8px;flex-wrap:wrap">
          <span style="color:var(--text-dim)">Клиент: <span style="color:var(--text)">${ord.client||'—'}</span></span>
          ${!isSpecial?`<span style="color:var(--text-dim)">Кол-во: <span style="color:var(--text)">${ord.qty} шт</span></span>`:''}
        </div>
        ${ord.note?`<p style="font-size:12px;color:var(--text-dim);font-style:italic;margin-bottom:8px">"${ord.note}"</p>`:''}
        ${isSpecial&&ord.wishes?`<div style="background:rgba(74,123,191,.06);border:1px solid rgba(74,123,191,.15);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--text-mid)">💬 ${ord.wishes}</div>`:''}
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold)">${fmt(ord.price)} ₸</div>
            ${!isSpecial?`<div style="font-size:11px;color:${profit>0?'var(--green)':'var(--red)'}">прибыль: ${fmt(profit)} ₸</div>`:''}
            ${ord.advance>0?`<div style="font-size:11px;color:var(--blue)">аванс: ${fmt(ord.advance)} ₸ · <span style="color:var(--red);font-weight:600">ост. ${fmt(ord.price-ord.advance)} ₸</span></div>`:''}
            ${ord.deadline?`<div style="font-size:11px;margin-top:2px;color:${new Date(ord.deadline)<new Date()?'var(--red)':'var(--text-mid)'};">${new Date(ord.deadline)<new Date()?'⚠ просрочен':'📅'} ${new Date(ord.deadline).toLocaleDateString('ru',{day:'numeric',month:'short'})}</div>`:''}

  });
  document.getElementById('page-orders').innerHTML = html;
}

function renderShopping() {
  const needed = materials.filter(m=>m.stock<MIN).map(m=>({...m,needQty:Math.max(0,MIN-m.stock),urgent:m.stock<LOW})).sort((a,b)=>a.stock-b.stock);
  const totalCostShop = needed.reduce((s,m)=>s+m.needQty*m.price,0);
  const doneN = needed.filter(m=>checked[m.id]).length;
  let html = `<h1 class="page-title">Закупки</h1><div class="divider"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <p style="color:var(--text-dim);font-size:12px">Меньше ${MIN} единиц</p>
    <span style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold)">${fmt(totalCostShop)} ₸</span>
  </div>`;
  if(needed.length) {
    html+=`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:6px">
      <span>Закуплено ${doneN} из ${needed.length}</span><span>${Math.round(doneN/needed.length*100)}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${needed.length?doneN/needed.length*100:0}%"></div></div>`;
  }
  if(!needed.length) html+=`<div class="empty"><div class="empty-icon">✓</div><p class="empty-text">Всё в порядке!</p></div>`;
  else needed.forEach(mat=>{
    const done = checked[mat.id];
    html+=`<div class="shop-item ${done?'done':''}">
      <div class="check-box ${done?'on':''}" onclick="toggleCheck(${mat.id})">${done?'✓':''}</div>
      <div class="shop-info">
        <div class="shop-name ${done?'done-text':''}">${mat.name}${mat.urgent&&!done?' <span style="color:var(--red);font-size:10px;font-weight:600">СРОЧНО</span>':''}</div>
        <div class="shop-sub">Есть: ${mat.stock} ${mat.unit} · Нужно: +${mat.needQty} ${mat.unit} · ${fmt(mat.needQty*mat.price)} ₸</div>
      </div>
      ${!done?`<button class="btn btn-green btn-sm" style="flex-shrink:0" onclick="restock(${mat.id},${mat.needQty})">✓</button>`:''}
    </div>`;
  });
  if(needed.length) {
    html+=`<div class="card" style="margin-top:8px"><div class="card-title" style="font-size:14px;margin-bottom:12px">После закупки можно сделать</div>`;
    recipes.forEach(r=>{
      const now=canMake(r);
      const afterMats=materials.map(m=>{const n=needed.find(x=>x.id===m.id);return n?{...m,stock:m.stock+n.needQty}:m;});
      const origMats=materials; materials=afterMats;
      const after=canMake(r);
      materials=origMats;
      html+=`<div class="list-item"><div class="list-label" style="font-family:'Cormorant Garamond',serif">${r.name}</div><span style="font-size:13px"><span style="color:var(--text-dim)">${now}</span> → <span style="color:var(--green)">${after} шт</span></span></div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('page-shopping').innerHTML = html;
}

// Actions
function toggleCheck(id) { checked[id]=!checked[id]; renderShopping(); }
function restock(id, qty) { const m=materials.find(x=>x.id===id); if(m){m.stock+=qty;saveMats();render();} }
function setOrderStatus(id, status) { const o=orders.find(x=>x.id===id); if(o){o.status=status;saveOrds();renderOrders();} }
function deleteRecipe(id) {
  if(confirm('Удалить рецепт?')) {
    recipes = recipes.filter(r=>r.id!==id);
    sbDelete('jewelry_recipes', id).catch(e=>console.warn('del recipe',e));
    renderRecipes();
  }
}
function deleteMaterial(id) {
  if(confirm('Удалить материал?')) {
    materials = materials.filter(m=>m.id!==id);
    sbDelete('jewelry_materials', id).catch(e=>console.warn('del mat',e));
    renderMaterials();
  }
}
function deleteOrder(id) {
  if(confirm('Удалить заказ?')) {
    orders = orders.filter(o=>o.id!==id);
    sbDelete('jewelry_orders', id).catch(e=>console.warn('del order',e));
    renderOrders();
  }
}

function showModal(html) {
  document.getElementById('modal-content').innerHTML = `<div class="modal-handle"></div>${html}`;

}

function openRecipeModal(id) {
  const rec = id ? recipes.find(r=>r.id===id) : null;
  const r = rec || {name:'',type:'necklace',description:'',ingredients:[],markup:150,customPrice:null,laborHours:0,laborRate:3000};
  window._editRec = JSON.parse(JSON.stringify(r));
  window._priceMode = r.customPrice!=null?'manual':'auto';
  renderRecipeModal();

// Обновляет только превью стоимости без перерисовки модала
function updateRecipeCostPreview() {
  const r = window._editRec;
  if(!r) return;
  const mc = r.ingredients.reduce((s,ing)=>{
    const p=ing.cp!=null?ing.cp:(materials.find(m=>m.id===ing.mid)?.price||0);
    return s+p*ing.qty;
  },0);
  const lc = (r.laborHours||0)*(r.laborRate||0);
  const cost = mc+lc;
  const pm = window._priceMode||'auto';
  const autoP = Math.round(cost*(1+(r.markup||0)/100));

  const elLabor = document.getElementById('rec-labor-cost');
  if(elLabor) elLabor.textContent = lc>0 ? 'Стоимость работы: '+fmt(lc)+' ₸' : '';

  const elMat = document.getElementById('rec-mat-cost');
  if(elMat) elMat.textContent = fmt(mc)+' ₸';

  const elLabor2 = document.getElementById('rec-labor-cost2');
  if(elLabor2) elLabor2.textContent = fmt(lc)+' ₸';

  const elTotal = document.getElementById('rec-total-cost');
  if(elTotal) elTotal.textContent = fmt(cost)+' ₸';

  const elPrice = document.getElementById('rec-final-price');
  if(elPrice && pm==='auto') elPrice.textContent = fmt(autoP)+' ₸';

  const elMarkup = document.getElementById('rec-markup-info');
  if(elMarkup && pm==='manual' && r.customPrice!=null && cost>0) {
    const mk = Math.round((r.customPrice/cost-1)*100);
    elMarkup.textContent = 'Наценка: '+mk+'%'+(mk<0?' ⚠ ниже себестоимости':'');
    elMarkup.style.color = mk<0?'var(--red)':'var(--text-dim)';
  }
}

function uploadMatPhoto(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 500;
      let w = img.width, h = img.height;
      if(w > MAX) { h = Math.round(h*MAX/w); w = MAX; }
      if(h > MAX) { w = Math.round(w*MAX/h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      window._editMat.photo = canvas.toDataURL('image/jpeg', 0.7);
      renderMaterialModal();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function specOrderCost() {
  const o = window._editOrd;
  const matCost = (o.specIngredients||[]).reduce((s,ing)=>{
    const p = ing.cp!=null ? ing.cp : (materials.find(m=>m.id===ing.mid)?.price||0);
    return s + p*ing.qty;
  }, 0);
  const totalMins = (o.laborHours||0)*60 + (o.laborMins||0);

  return {matCost, laborCost, total: matCost+laborCost};

function saveOrder() {
  const o = window._editOrd;
  if(o.id) orders=orders.map(x=>x.id===o.id?o:x);
  else { o.id=Date.now(); orders.push(o); }
  saveOrds(); closeModal(); renderOrders();
}

// ── АНАЛИТИКА ────────────────────────────────────────────────────
function renderAnalytics() {
  const soldOrders = orders.filter(o=>o.status==='sold');
  const months = {};
  soldOrders.forEach(o=>{
    const d = new Date(o.date);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleString('ru',{month:'short',year:'numeric'});
    if(!months[key]) months[key]={label,revenue:0,profit:0,count:0};
    const rec = recipes.find(r=>r.id===o.rid);
    const cost = rec ? totalCost(rec)*o.qty : 0;
    months[key].revenue += o.price;
    months[key].profit += o.price - cost;
    months[key].count += o.qty;
  });
  const sortedKeys = Object.keys(months).sort();
  const maxRev = Math.max(...sortedKeys.map(k=>months[k].revenue), 1);
  const totalRev = soldOrders.reduce((s,o)=>s+o.price,0);
  const totalProfit = soldOrders.reduce((s,o)=>{
    const rec=recipes.find(r=>r.id===o.rid);
    return s+o.price-(rec?totalCost(rec)*o.qty:0);
  },0);
  const topRec = (() => {
    const cnt = {};
    soldOrders.forEach(o=>{ cnt[o.rid]=(cnt[o.rid]||0)+o.qty; });
    const top = Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
    return top ? recipes.find(r=>r.id==top[0])?.name : '—';
  })();

  let barsHtml = '';
  if(sortedKeys.length===0) {
    barsHtml = `<p style="color:var(--text-dim);font-size:13px;text-align:center;padding:30px 0">Нет проданных заказов</p>`;
  } else {
    barsHtml = `<div style="display:flex;align-items:flex-end;gap:8px;height:140px;padding:0 4px">`;
    sortedKeys.forEach(k=>{
      const m=months[k];
      const h=Math.max(Math.round((m.revenue/maxRev)*120),4);
      barsHtml+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <span style="font-size:10px;color:var(--gold);font-weight:500">${fmt(m.revenue/1000)}к</span>
        <div style="width:100%;height:${h}px;background:linear-gradient(180deg,var(--gold),var(--gold-dim));border-radius:4px 4px 0 0;position:relative" title="${fmt(m.revenue)} ₸">
          <div style="position:absolute;bottom:0;left:0;right:0;height:${Math.round((m.profit/m.revenue)*h)}px;background:rgba(74,158,107,0.35);border-radius:0 0 4px 4px"></div>
        </div>
        <span style="font-size:9px;color:var(--text-dim);text-align:center;line-height:1.2">${m.label}</span>
      </div>`;
    });
    barsHtml += `</div>
    <div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--text-dim)">
      <span>🟡 Выручка</span><span>🟢 Прибыль</span>
    </div>`;
  }

  // Top recipes by count
  const recStats = {};
  soldOrders.forEach(o=>{ recStats[o.rid]=(recStats[o.rid]||0)+o.qty; });
  const topRecs = Object.entries(recStats).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const avgOrder=soldOrders.length?Math.round(totalRev/soldOrders.length):0;
  const margin=totalRev>0?Math.round(totalProfit/totalRev*100):0;
  const activeA=orders.filter(o=>o.status!=='sold');
  const totalReceivable=activeA.reduce((s,o)=>s+(o.price-(o.advance||0)),0);

  let html = `<h1 class="page-title">Аналитика</h1><div class="divider"></div>
  <div class="stat-grid">
    <div class="stat-card"><span class="stat-val" style="color:var(--green);font-size:18px">${fmt(totalRev)} ₸</span><span class="stat-label">Общая выручка</span></div>
    <div class="stat-card"><span class="stat-val" style="color:var(--gold);font-size:18px">${fmt(totalProfit)} ₸</span><span class="stat-label">Прибыль · ${margin}%</span></div>
    <div class="stat-card"><span class="stat-val">${soldOrders.length}</span><span class="stat-label">Продано</span></div>
    <div class="stat-card"><span class="stat-val" style="font-size:16px">${fmt(avgOrder)} ₸</span><span class="stat-label">Средний чек</span></div>
  </div>
  ${totalReceivable>0?`<div class="card" style="border-left:3px solid var(--red);margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px">Ожидается к получению</div><div style="font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--red)">${fmt(totalReceivable)} ₸</div></div><div style="font-size:12px;color:var(--text-dim);text-align:right">${activeA.length} заказов</div></div></div>`:''}
  <div class="card"><div class="card-title">Выручка по месяцам</div>${barsHtml}</div>`;

  if(topRecs.length) {
    html += `<div class="card"><div class="card-title">Популярные изделия</div>`;
    const maxQ = topRecs[0][1];
    topRecs.forEach(([rid,qty])=>{
      const r=recipes.find(x=>x.id==rid);
      html+=`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span style="color:var(--text)">${r?.name||'—'}</span>
          <span style="color:var(--text-mid)">${qty} шт</span>
        </div>
        <div style="height:6px;background:var(--bg3);border-radius:3px"><div style="height:100%;width:${Math.round(qty/maxQ*100)}%;background:var(--gold);border-radius:3px"></div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  // Monthly profit margin
  if(sortedKeys.length>0) {
    html+=`<div class="card"><div class="card-title">Детали по месяцам</div>`;
    [...sortedKeys].reverse().forEach(k=>{
      const m=months[k];
      const margin=m.revenue>0?Math.round(m.profit/m.revenue*100):0;
      html+=`<div class="list-item">
        <div><div class="list-label">${m.label}</div><div class="list-sub">${m.count} шт · маржа ${margin}%</div></div>
        <div style="text-align:right"><div style="color:var(--green);font-size:13px">${fmt(m.revenue)} ₸</div><div style="color:var(--gold);font-size:11px">+${fmt(m.profit)} ₸</div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  document.getElementById('page-analytics').innerHTML = html;
}

function copyConfirmText(btn) {
  if(!window._copyText) return;
  navigator.clipboard.writeText(window._copyText).then(()=>{
    btn.textContent = '✓ Скопировано!';
    setTimeout(()=>{ btn.textContent = '📋 Скопировать текст (для WhatsApp/Telegram)'; }, 2000);
  }).catch(()=>{
    // Fallback for browsers without clipboard API
    const ta = document.createElement('textarea');
    ta.value = window._copyText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    btn.textContent = '✓ Скопировано!';
    setTimeout(()=>{ btn.textContent = '📋 Скопировать текст (для WhatsApp/Telegram)'; }, 2000);
  });
}

function checkLowStock() {
  const low = materials.filter(m=>m.stock<LOW);
  if(low.length && 'Notification' in window) {
    Notification.requestPermission().then(p=>{
      if(p==='granted') {
        low.forEach(m=>{
          new Notification('⚠ Zeynep Sotuar', {
            body: `Заканчивается: ${m.name} (${m.stock} ${m.unit})`,
            icon: ''
          });
        });
      }
    });
  }
}

function uploadPhoto(recId, input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rec = recipes.find(r=>r.id===recId);
    if(rec) { rec.photo = e.target.result; saveRecs(); closeModal(); renderRecipes(); }
  };
  reader.readAsDataURL(file);
}

function removePhoto(recId) {
  const rec = recipes.find(r=>r.id===recId);
  if(rec) { delete rec.photo; saveRecs(); closeModal(); renderRecipes(); }
}
